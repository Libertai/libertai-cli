name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 1. Build + test on all three OSes before we ship anything.
  verify:
    name: Verify Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release

  # 2. Verify the tag version matches Cargo.toml and classify prerelease.
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: get-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GIT_REF#refs/tags/v}"
          fi
          # Strict validation: only digits, dots, and safe prerelease chars.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::invalid version format: $VERSION"
            exit 1
          fi

          IS_PRERELEASE="false"
          case "$VERSION" in *-*) IS_PRERELEASE="true" ;; esac

          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag version ($VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is-prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

  # 3. Require a manually-created GitHub Release (with human-authored notes)
  #    before we start attaching binaries. Mirrors the Aleph CLI flow.
  check-release:
    name: Verify Release Exists
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          TAG="v$VERSION"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::error::Release with tag $TAG not found. Draft a GitHub Release with notes before pushing the tag."
            exit 1
          fi

  # 4. Cross-build and attach binaries + sha256 sidecars.
  build-binaries:
    name: Build Release Binaries
    needs: [verify, check-version, check-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libertai
            asset: libertai-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: libertai.exe
            asset: libertai-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libertai
            asset: libertai-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libertai
            asset: libertai-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Stage asset
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
          ASSET: ${{ matrix.asset }}
        run: cp "./target/$TARGET/release/$ARTIFACT" "$ASSET"

      - name: Compute sha256
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
          ASSET: ${{ matrix.asset }}
        run: |
          gh release upload "v$VERSION" \
            "$ASSET" "$ASSET.sha256" \
            --repo "$REPO" --clobber

  # 5. Publish a signed .deb to the Libertai APT repo (GitHub Pages).
  #
  # GPG key setup (one-time):
  #   1. Generate an Ed25519 signing key:
  #        gpg --batch --gen-key <<EOF
  #        Key-Type: EdDSA
  #        Key-Curve: ed25519
  #        Name-Real: LibertAI Packaging
  #        Name-Email: packaging@libertai.io
  #        %no-protection
  #        %commit
  #        EOF
  #   2. Export as APT_GPG_PRIVATE_KEY:
  #        gpg --export-secret-keys --armor packaging@libertai.io
  #   3. The public key is exported automatically by this workflow to apt.libertai.io/gpg.key.
  #
  # Required secrets (env: apt):
  #   - APT_GPG_PRIVATE_KEY: ASCII-armored private key (from step 2)
  #   - APT_REPO_TOKEN: PAT with write access to Libertai/apt
  publish-apt:
    name: Publish to APT Repository
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.is-prerelease != 'true'
    runs-on: ubuntu-latest
    environment: apt
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deb-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb -p libertai-cli

      - name: Upload .deb to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          DEB_FILE=$(find target/debian -name "libertai-cli_*.deb" | head -1)
          gh release upload "v$VERSION" \
            "$DEB_FILE" \
            --repo "$REPO" --clobber

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: Libertai/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Ensure reprepro config exists
        run: |
          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions <<EOF
          Origin: LibertAI
          Label: LibertAI
          Codename: stable
          Architectures: amd64
          Components: main
          Description: LibertAI CLI packages
          SignWith: yes
          EOF
          cat > apt-repo/conf/options <<EOF
          verbose
          basedir .
          EOF

      - name: Export public GPG key
        run: gpg --export --armor > apt-repo/gpg.key

      - name: Ensure GitHub Pages files exist
        run: |
          echo "apt.libertai.io" > apt-repo/CNAME
          cp packaging/apt/install.sh apt-repo/install.sh

      - name: Update APT repository
        run: |
          cd apt-repo
          DEB_FILE=$(find ../target/debian -name "libertai-cli_*.deb" | head -1)
          reprepro remove stable libertai-cli || true
          reprepro includedeb stable "$DEB_FILE"

      - name: Push APT repository
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update libertai-cli to v$VERSION"
          git push

  # 6. Update the Libertai Homebrew tap with a regenerated formula.
  #
  # Required secrets (env: brew):
  #   - BREW_REPO_TOKEN: PAT with write access to Libertai/homebrew-tap
  publish-brew:
    name: Publish to Homebrew Tap
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.is-prerelease != 'true'
    runs-on: ubuntu-latest
    environment: brew
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "v$VERSION" \
            --repo "$REPO" \
            --pattern "libertai-macos-*" \
            --dir ./artifacts

      - name: Verify downloads
        run: |
          test -f ./artifacts/libertai-macos-aarch64 || { echo "Missing aarch64 binary"; exit 1; }
          test -f ./artifacts/libertai-macos-x86_64 || { echo "Missing x86_64 binary"; exit 1; }

      - name: Generate formula from template
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          SHA_ARM64=$(sha256sum ./artifacts/libertai-macos-aarch64 | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum ./artifacts/libertai-macos-x86_64 | cut -d' ' -f1)

          sed -e "s/{{version}}/$VERSION/g" \
              -e "s/{{sha256_arm64}}/$SHA_ARM64/g" \
              -e "s/{{sha256_x86_64}}/$SHA_X86_64/g" \
              packaging/brew/formula.rb.tmpl > libertai.rb

          if grep -q '{{' libertai.rb; then
            echo "::error::unreplaced placeholders in generated formula"
            exit 1
          fi

          echo "Generated formula:"
          cat libertai.rb

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Libertai/homebrew-tap
          token: ${{ secrets.BREW_REPO_TOKEN }}
          path: homebrew-tap

      - name: Update formula and push
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          mkdir -p homebrew-tap/Formula
          cp libertai.rb homebrew-tap/Formula/libertai.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/libertai.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping push"
          else
            git commit -m "Update libertai to v$VERSION"
            git push
          fi

  # 7. Manual approval checkpoint before we push anything to crates.io.
  request-publish-approval:
    name: Request Publish Approval
    runs-on: ubuntu-latest
    needs: [verify, check-version, build-binaries]
    environment:
      name: crates-io-publish
    steps:
      - name: Approval checkpoint
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          echo "Crate to be published: libertai-cli v$VERSION"
          echo "All checks passed; binaries attached; awaiting crates.io publish."

  # 8. Publish the single crate (no inter-crate sequencing needed).
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, request-publish-approval]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish libertai-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Update release notes with crates.io link
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        with:
          script: |
            const version = process.env.VERSION;
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === `v${version}`);
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: (release.body || '') + '\n\n---\n**Published to crates.io**\n' +
                      `- [libertai-cli](https://crates.io/crates/libertai-cli/${version})\n`
              });
            }
