name: CI

on:
  push:
    branches:
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # The codebase is not clippy-clean yet, so clippy is advisory only.
      # Tighten to `-- -D warnings` once existing lints are addressed.
      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Enable Git long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}

      # Offline by default: the tier-2 network probes are feature-gated
      # behind `tier2-probes` and `#[ignore]`d, so a plain `cargo test`
      # never touches the network.
      - name: Run tests
        if: runner.os != 'Windows'
        run: cargo test --verbose -- --test-threads=1

      # Mirrors release.yml: only the config_roundtrip integration test
      # currently passes on Windows; the probe suites are POSIX-only.
      - name: Run Windows integration tests
        if: runner.os == 'Windows'
        run: cargo test --verbose --test config_roundtrip -- --test-threads=1

      - name: Build
        run: cargo build --verbose
